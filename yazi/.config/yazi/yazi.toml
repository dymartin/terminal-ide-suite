[mgr]
ratio        = [1, 3, 4]
sort_by      = "natural"
sort_dir_first = true
show_hidden  = false
linemode     = "size"

[preview]
tab_size   = 2
max_width  = 800
max_height = 900

[opener]
edit = [
  { run = 'hx "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { name = "*/", use = "edit" },
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "*", use = "edit" },
]
